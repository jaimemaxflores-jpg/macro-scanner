function scoreIt(it,goals){let s=0;if(goals.includes(“highProtein”))s+=(it.p/Math.max(it.cal,1))*1000;if(goals.includes(“lowCal”))s+=(1/Math.max(it.cal,1))*5000;if(goals.includes(“highFiber”))s+=it.fb*10;if(goals.includes(“lowSugar”))s+=(1/Math.max(it.s+1,1))*50;if(goals.includes(“lowFat”))s+=(1/Math.max(it.f+1,1))*50;if(goals.includes(“keto”))s+=(it.f/Math.max(it.c+1,1))*30;if(goals.includes(“mediterranean”))s+=(it.p*2+it.fb*3)/Math.max(it.s+1,1);return s;}
function passDiet(it,diets){for(const d of diets)if(DIET_RULES[d]&&!DIET_RULES[d](it))return false;return true;}

async function searchOFF(query){try{const url=`https://world.openfoodfacts.org/cgi/search.pl?search_terms=${encodeURIComponent(query)}&search_simple=1&action=process&json=1&page_size=15&fields=product_name,code,nutriments,serving_size,image_small_url,brands`;const r=await fetch(url);const d=await r.json();if(!d.products)return[];return d.products.filter(p=>p.product_name&&p.nutriments).map(p=>{const n=p.nutriments;const name=p.brands?`${p.product_name} (${p.brands.split(",")[0]})`:p.product_name;return{name,sub:guessSubtype(name)||“other”,sv:p.serving_size||“per 100g”,cal:Math.round(n[“energy-kcal_serving”]||n[“energy-kcal_100g”]||0),p:Math.round((n.proteins_serving||n.proteins_100g||0)*10)/10,c:Math.round((n.carbohydrates_serving||n.carbohydrates_100g||0)*10)/10,f:Math.round((n.fat_serving||n.fat_100g||0)*10)/10,fb:Math.round((n.fiber_serving||n.fiber_100g||0)*10)/10,s:Math.round((n.sugars_serving||n.sugars_100g||0)*10)/10,tax:true,emoji:“📦”,img:p.image_small_url||null,code:p.code}}).filter(p=>p.cal>0||p.p>0||p.c>0)}catch(e){return[]}}

function Badge({text,type}){const styles={positive:{bg:”#ECFDF5”,c:”#059669”},negative:{bg:”#FFF7ED”,c:”#EA580C”},info:{bg:”#F0FDFA”,c:”#0D9488”},warning:{bg:”#FEF2F2”,c:”#DC2626”}};const s=styles[type]||styles.info;return <span style={{display:“inline-block”,fontSize:11,fontWeight:600,padding:“3px 8px”,borderRadius:20,background:s.bg,color:s.c,whiteSpace:“nowrap”}}>{text}</span>}
function ResultRow({it,onClick}){return <div onClick={onClick} style={{display:“flex”,gap:12,alignItems:“center”,padding:“12px 14px”,background:T.card,borderRadius:12,cursor:“pointer”,border:`1px solid ${T.bdr}`,marginBottom:8}}><ItemImg it={it} sz={40}/><div style={{flex:1,minWidth:0}}><div style={{fontSize:14,fontWeight:600,color:T.tx,overflow:“hidden”,textOverflow:“ellipsis”,whiteSpace:“nowrap”}}>{it.name}</div><div style={{fontSize:11,color:T.mt,marginTop:2}}>{it.sv}</div></div><div style={{textAlign:“right”,flexShrink:0}}><div style={{fontSize:16,fontWeight:700,color:T.cal}}>{it.cal}</div><div style={{fontSize:10,color:T.mt}}>cal</div></div></div>}

function SubCard({it,scanned,rank,goals}){const[open,setOpen]=useState(false);const d={cal:it.cal-scanned.cal,p:it.p-scanned.p,s:it.s-scanned.s,fb:it.fb-scanned.fb,f:it.f-scanned.f};return <div onClick={()=>setOpen(!open)} style={{background:T.card,border:rank===0?`2px solid ${T.ac}`:`1px solid ${T.bdr}`,borderRadius:14,padding:14,cursor:“pointer”,position:“relative”,boxShadow:rank===0?`0 0 0 3px ${T.ac}18`:T.sh}}>{rank===0&&<div style={{position:“absolute”,top:-10,right:14,background:T.ac,color:”#fff”,fontSize:10,fontWeight:700,padding:“3px 10px”,borderRadius:20,letterSpacing:0.5}}>BEST SWAP</div>}<div style={{display:“flex”,gap:12,alignItems:“center”}}><ItemImg it={it} sz={38}/><div style={{flex:1,minWidth:0}}><div style={{fontSize:14,fontWeight:600,color:T.tx,overflow:“hidden”,textOverflow:“ellipsis”,whiteSpace:“nowrap”}}>{it.name}</div><div style={{fontSize:11,color:T.mt}}>{it.sv}</div></div><div style={{textAlign:“right”}}><div style={{fontSize:16,fontWeight:700,color:T.cal}}>{it.cal}</div><div style={{fontSize:10,color:T.mt}}>cal</div></div></div><div style={{display:“flex”,gap:10,marginTop:10,fontSize:12,fontWeight:600}}><span style={{color:T.pr}}>{it.p}g P</span><span style={{color:T.cb}}>{it.c}g C</span><span style={{color:T.ft}}>{it.f}g F</span></div><div style={{display:“flex”,gap:6,marginTop:8,flexWrap:“wrap”}}>{goals.includes(“highProtein”)&&d.p>0&&<Badge text={`+${d.p.toFixed(0)}g protein`} type=“positive”/>}{goals.includes(“lowCal”)&&d.cal<0&&<Badge text={`${d.cal} cal`} type=“negative”/>}{goals.includes(“lowSugar”)&&d.s<0&&<Badge text={`${d.s.toFixed(0)}g sugar`} type=“warning”/>}{goals.includes(“highFiber”)&&d.fb>0&&<Badge text={`+${d.fb.toFixed(0)}g fiber`} type=“positive”/>}{goals.includes(“lowFat”)&&d.f<0&&<Badge text={`${d.f.toFixed(0)}g fat`} type=“info”/>}</div>{open&&<div style={{marginTop:12,paddingTop:12,borderTop:`1px solid ${T.bdr}`}}><div style={{fontSize:11,fontWeight:700,color:T.mt,letterSpacing:0.5,marginBottom:6}}>VS {scanned.name.toUpperCase()}</div>{[[“Calories”,scanned.cal,it.cal,””,“lower”],[“Protein”,scanned.p,it.p,“g”,“higher”],[“Carbs”,scanned.c,it.c,“g”,“lower”],[“Fat”,scanned.f,it.f,“g”,“lower”],[“Fiber”,scanned.fb,it.fb,“g”,“higher”],[“Sugar”,scanned.s,it.s,“g”,“lower”]].map(([l,sv,nv,u,better])=>{const df=nv-sv;const good=better===“higher”?df>0:df<0;return <div key={l} style={{display:“flex”,justifyContent:“space-between”,fontSize:12,padding:“3px 0”}}><span style={{color:T.sub}}>{l}</span><span style={{fontWeight:600,color:df===0?T.mt:good?T.pos:T.neg}}>{nv}{u} {df>0?“▲”:df<0?“▼”:”—”} {Math.abs(df).toFixed(1)}{u}</span></div>})}</div>}</div>}

function App(){
const[screen,setScreen]=useState(“search”);
const[query,setQuery]=useState(””);
const[results,setResults]=useState([]);
const[loading,setLoading]=useState(false);
const[searched,setSearched]=useState(false);
const[item,setItem]=useState(null);
const[price,setPrice]=useState(””);
const[nGoals,setNG]=useState([“highProtein”,“lowCal”]);
const[dGoals,setDG]=useState([]);
const[showGoals,setSG]=useState(false);
const[goalTab,setGT]=useState(“nutrition”);
const allGoals=[…nGoals,…dGoals];

const doSearch=async(q)=>{const term=(q||query).trim();if(!term)return;setLoading(true);setSearched(true);setResults([]);const localHits=SUBS_DB.filter(it=>it.name.toLowerCase().includes(term.toLowerCase()));const offHits=await searchOFF(term);const combined=[…localHits];for(const off of offHits){const isDupe=combined.some(loc=>{const a=loc.name.toLowerCase().replace(/[^a-z0-9]/g,””);const b=off.name.toLowerCase().replace(/[^a-z0-9]/g,””);return a.includes(b.slice(0,15))||b.includes(a.slice(0,15))});if(!isDupe)combined.push(off)}setResults(combined.slice(0,25));setLoading(false)};
const selectItem=(it)=>{setItem(it);setScreen(“detail”);setPrice(””)};
const goBack=()=>{setScreen(“search”);setItem(null)};
const tax=useMemo(()=>{if(!item||!price)return null;const p=parseFloat(price);if(isNaN(p))return null;const t=item.tax?p*TAX:0;return{sub:p,tax:t,total:p+t}},[item,price]);
const subs=useMemo(()=>{if(!item||allGoals.length===0||!item.sub||item.sub===“other”)return[];const myScore=scoreIt(item,allGoals);return SUBS_DB.filter(v=>v.name!==item.name&&v.sub===item.sub&&passDiet(v,dGoals)).map(v=>({…v,_sc:scoreIt(v,allGoals)})).filter(v=>v._sc>myScore).sort((a,b)=>b._sc-a._sc).slice(0,6)},[item,allGoals,dGoals]);
const subLabel=item?(SUB_LABELS[item.sub]||””):””;

const CATS=[[“🍕”,“Pizza”],[“🍔”,“Burger”],[“🌮”,“Tacos”],[“🌯”,“Burrito”],[“🥪”,“Sandwich”],[“🍗”,“Wings”],[“🍟”,“Fries”],[“🥗”,“Salad”],[“🍚”,“Rice Bowl”],[“🥞”,“Pancakes”],[“🍩”,“Donuts”],[“🎂”,“Cake”],[“🌭”,“Hot Dog”],[“🍳”,“Breakfast Sandwich”],[“🧀”,“Mac & Cheese”],[“🍜”,“Ramen”],[“🍲”,“Soup”],[“🥩”,“Jerky”],[“🍫”,“Protein Bars”],[“🥛”,“Greek Yogurt”],[“🍞”,“Bread”],[“🥔”,“Chips”],[“🥣”,“Cereal”],[“🍦”,“Ice Cream”],[“⚡”,“Energy Drink”],[“🍪”,“Cookies”],[“🍝”,“Pasta”],[“🥜”,“Peanut Butter”],[“🍬”,“Candy”],[“🥐”,“Pop Tarts”],[“🌮”,“Tortillas”],[“🍱”,“Frozen Meal”],[“🥤”,“Smoothie”],[“🧃”,“Juice”],[“☕”,“Coffee”]];

return <div style={{minHeight:“100vh”,background:T.bg}}>
<div style={{background:”#fff”,borderBottom:`1px solid ${T.bdr}`,padding:“14px 16px”,position:“sticky”,top:0,zIndex:10}}>
<div style={{display:“flex”,alignItems:“center”,gap:10,maxWidth:480,margin:“0 auto”}}>
{screen===“detail”&&<button onClick={goBack} style={{background:T.bg,border:`1px solid ${T.bdr}`,borderRadius:8,width:36,height:36,display:“flex”,alignItems:“center”,justifyContent:“center”,fontSize:18,cursor:“pointer”,color:T.tx,flexShrink:0}}>←</button>}
<div style={{flex:1}}><h1 style={{margin:0,fontSize:18,fontWeight:800,color:T.tx,letterSpacing:-0.5}}>PLU Macro Scanner</h1><div style={{fontSize:10,color:T.mt,fontFamily:”‘JetBrains Mono’,monospace”}}>Bexar County · 8.25% Tax · 280+ items + Open Food Facts</div></div>
<span style={{fontSize:10,fontWeight:700,letterSpacing:2,color:T.ac}}>v0.6</span>
</div>
</div>
<div style={{maxWidth:480,margin:“0 auto”,padding:“14px 16px 40px”}}>
{screen===“search”&&<>
<div style={{display:“flex”,gap:8,marginBottom:16,background:T.card,borderRadius:14,padding:5,boxShadow:T.shL,border:`1px solid ${T.bdr}`}}>
<input value={query} onChange={e=>{setQuery(e.target.value);setSearched(false)}} onKeyDown={e=>e.key===“Enter”&&doSearch()} placeholder=“Search any food…” style={{flex:1,padding:“11px 14px”,background:“transparent”,border:“none”,color:T.tx,fontSize:15,outline:“none”}}/>
<button onClick={()=>doSearch()} style={{padding:“10px 20px”,background:T.ac,border:“none”,borderRadius:10,color:”#fff”,fontSize:14,fontWeight:700,cursor:“pointer”}}>Search</button>
</div>
{!searched&&<div style={{marginBottom:16}}><div style={{fontSize:11,fontWeight:700,color:T.mt,letterSpacing:0.5,marginBottom:10}}>POPULAR CATEGORIES</div><div style={{display:“flex”,gap:8,flexWrap:“wrap”}}>{CATS.map(([emoji,label])=><button key={label+emoji} onClick={()=>{setQuery(label);doSearch(label)}} style={{padding:“8px 14px”,background:T.card,border:`1px solid ${T.bdr}`,borderRadius:22,fontSize:13,cursor:“pointer”,color:T.sub,fontWeight:500,display:“flex”,alignItems:“center”,gap:6,boxShadow:T.sh}}><span>{emoji}</span> {label}</button>)}</div></div>}
{loading&&<div style={{textAlign:“center”,padding:“40px 20px”,color:T.sub}}><div style={{fontSize:32,marginBottom:10,animation:“spin 1s linear infinite”}}>🔄</div><div style={{fontSize:14}}>Searching…</div></div>}
{!loading&&searched&&<div><div style={{fontSize:11,fontWeight:700,color:T.mt,letterSpacing:0.5,marginBottom:10}}>{results.length} RESULTS FOR “{query.toUpperCase()}”</div>{results.length>0?results.map((it,i)=><ResultRow key={it.name+i} it={it} onClick={()=>selectItem(it)}/>):<div style={{textAlign:“center”,padding:“40px 20px”,color:T.sub}}><div style={{fontSize:32,marginBottom:10}}>🤷</div>No results found.</div>}</div>}
{!searched&&!loading&&<div style={{textAlign:“center”,padding:“30px 20px”,marginTop:10}}><div style={{width:72,height:72,borderRadius:18,background:T.card,boxShadow:T.shL,display:“flex”,alignItems:“center”,justifyContent:“center”,margin:“0 auto 14px”,fontSize:32,border:`1px solid ${T.bdr}`}}>🔍</div><div style={{fontSize:16,fontWeight:600,color:T.tx,marginBottom:4}}>Search any food product</div><div style={{fontSize:13,color:T.mt,lineHeight:1.5}}>Type a product name or tap a category above.</div></div>}
</>}
{screen===“detail”&&item&&<>
<div style={{background:T.card,border:`1px solid ${T.bdr}`,borderRadius:16,padding:20,marginBottom:14,boxShadow:T.sh}}>
<div style={{display:“flex”,gap:14,alignItems:“center”,marginBottom:16}}>
<ItemImg it={item} sz={52}/>
<div style={{flex:1}}><h2 style={{margin:0,fontSize:16,fontWeight:700,color:T.tx,lineHeight:1.3}}>{item.name}</h2><div style={{fontSize:12,color:T.mt,fontFamily:”‘JetBrains Mono’,monospace”,marginTop:3}}>{item.sv}</div></div>
<div style={{background:item.tax?”#FEF2F2”:”#ECFDF5”,color:item.tax?”#B91C1C”:”#059669”,fontSize:10,fontWeight:700,padding:“4px 10px”,borderRadius:20,flexShrink:0}}>{item.tax?“TAXABLE”:“EXEMPT”}</div>
</div>
<div style={{textAlign:“center”,marginBottom:16}}><div style={{fontSize:52,fontWeight:800,color:T.cal,lineHeight:1,letterSpacing:-2}}>{item.cal}</div><div style={{fontSize:11,color:T.mt,fontWeight:600,letterSpacing:2,marginTop:4}}>CALORIES</div></div>
<div style={{display:“flex”,gap:8,marginBottom:14}}><Pill label=“PROTEIN” value={item.p+“g”} color={T.pr}/><Pill label=“CARBS” value={item.c+“g”} color={T.cb}/><Pill label=“FAT” value={item.f+“g”} color={T.ft}/></div>
<div style={{borderTop:`1px solid ${T.bdr}`,paddingTop:10}}>{[[“Fiber”,item.fb,T.fbr],[“Sugar”,item.s,T.sg]].map(([l,v,col])=><div key={l} style={{display:“flex”,justifyContent:“space-between”,padding:“5px 0”}}><span style={{fontSize:12,color:T.sub}}>{l}</span><span style={{fontSize:13,fontWeight:600,color:col}}>{v}g</span></div>)}</div>
</div>
<div style={{background:T.card,border:`1px solid ${T.bdr}`,borderRadius:16,padding:16,marginBottom:14,boxShadow:T.sh}}>
<div style={{fontSize:12,fontWeight:700,color:T.mt,letterSpacing:0.5,marginBottom:10}}>PRICE CALCULATOR</div>
<div style={{display:“flex”,gap:8,alignItems:“center”}}><span style={{color:T.sub,fontSize:20,fontWeight:600}}>$</span><input type=“number” step=“0.01” value={price} onChange={e=>setPrice(e.target.value)} placeholder=“Shelf price” style={{flex:1,padding:“10px 12px”,background:T.bg,border:`1px solid ${T.bdr}`,borderRadius:10,color:T.tx,fontSize:18,fontFamily:”‘JetBrains Mono’,monospace”,outline:“none”}}/></div>
{tax&&<div style={{marginTop:14,borderTop:`1px solid ${T.bdr}`,paddingTop:12,fontFamily:”‘JetBrains Mono’,monospace”}}><div style={{display:“flex”,justifyContent:“space-between”,fontSize:13,color:T.sub,marginBottom:4}}><span>Subtotal</span><span>${tax.sub.toFixed(2)}</span></div><div style={{display:“flex”,justifyContent:“space-between”,fontSize:13,color:item.tax?T.cal:T.pos,marginBottom:4}}><span>Tax (8.25%)</span><span>{item.tax?`+$${tax.tax.toFixed(2)}`:“Exempt”}</span></div><div style={{display:“flex”,justifyContent:“space-between”,fontSize:22,fontWeight:800,color:T.tx,borderTop:`1px solid ${T.bdr}`,paddingTop:8,marginTop:4}}><span>Total</span><span>${tax.total.toFixed(2)}</span></div>{item.p>0&&<div style={{fontSize:11,color:T.mt,marginTop:8,textAlign:“right”}}>${(tax.total/item.p).toFixed(2)}/g protein · ${(tax.total/item.cal*100).toFixed(2)}/100 cal</div>}</div>}
</div>
{subLabel&&<div style={{background:T.card,border:`1px solid ${T.bdr}`,borderRadius:16,padding:16,marginBottom:14,boxShadow:T.sh}}>
<button onClick={()=>setSG(!showGoals)} style={{width:“100%”,background:“none”,border:“none”,cursor:“pointer”,display:“flex”,justifyContent:“space-between”,alignItems:“center”,padding:0}}><span style={{fontSize:12,fontWeight:700,color:T.mt,letterSpacing:0.5}}>MY GOALS ({allGoals.length})</span><span style={{color:T.mt,fontSize:14}}>{showGoals?“▲”:“▼”}</span></button>
{showGoals&&<div style={{marginTop:14}}>
<div style={{display:“flex”,background:T.bg,borderRadius:10,padding:3,marginBottom:14}}>{[[“nutrition”,“Nutrition”],[“diet”,“Diet Type”]].map(([k,l])=><button key={k} onClick={()=>setGT(k)} style={{flex:1,padding:“8px 0”,border:“none”,borderRadius:8,background:goalTab===k?T.card:“transparent”,boxShadow:goalTab===k?T.sh:“none”,color:goalTab===k?T.tx:T.mt,fontSize:13,fontWeight:600,cursor:“pointer”}}>{l}</button>)}</div>
{(goalTab===“nutrition”?NUTR_GOALS:DIET_GOALS).map(g=>{const active=goalTab===“nutrition”?nGoals.includes(g.id):dGoals.includes(g.id);const toggle=()=>goalTab===“nutrition”?setNG(p=>p.includes(g.id)?p.filter(x=>x!==g.id):[…p,g.id]):setDG(p=>p.includes(g.id)?p.filter(x=>x!==g.id):[…p,g.id]);return <button key={g.id} onClick={toggle} style={{display:“flex”,alignItems:“center”,gap:10,padding:“10px 12px”,width:“100%”,marginBottom:6,background:active?T.acL:T.bg,border:active?`1.5px solid ${T.ac}`:`1px solid ${T.bdr}`,borderRadius:10,cursor:“pointer”,textAlign:“left”}}><span style={{fontSize:20}}>{g.icon}</span><div><div style={{fontSize:13,fontWeight:600,color:active?T.acD:T.tx}}>{g.label}</div><div style={{fontSize:11,color:T.mt}}>{g.d}</div></div></button>})}
</div>}
</div>}
{allGoals.length>0&&subLabel&&<div>
<div style={{fontSize:12,fontWeight:700,color:T.mt,letterSpacing:0.5,marginBottom:4}}>SWAP IN {subLabel.toUpperCase()}</div>
<div style={{fontSize:12,color:T.mt,marginBottom:14}}>Same type, better for your goals{dGoals.length>0?` · ${dGoals.map(d=>DIET_GOALS.find(g=>g.id===d)?.label).join(" + ")} only`:””}</div>
{subs.length>0?<div style={{display:“flex”,flexDirection:“column”,gap:10}}>{subs.map((s,i)=><SubCard key={s.name+i} it={s} scanned={item} rank={i} goals={allGoals}/>)}</div>:<div style={{background:T.card,border:`1px dashed ${T.bdr}`,borderRadius:14,padding:24,textAlign:“center”,color:T.mt,fontSize:13}}>{dGoals.length>0?`No ${subLabel.toLowerCase()} match your diet`:`Already the best ${subLabel.toLowerCase()} for your goals`}</div>}
<div style={{fontSize:11,color:T.mt,marginTop:14,textAlign:“center”}}>{[…nGoals.map(g=>NUTR_GOALS.find(p=>p.id===g)?.label),…dGoals.map(g=>DIET_GOALS.find(p=>p.id===g)?.label)].filter(Boolean).join(” + “)} · Tap card to compare</div>
</div>}
{!subLabel&&<div style={{background:T.card,border:`1px dashed ${T.bdr}`,borderRadius:14,padding:20,textAlign:“center”,color:T.sub,fontSize:13}}><div style={{fontSize:28,marginBottom:8}}>🌐</div>Substitutions not available for this item yet.<br/><span style={{fontSize:11,color:T.mt}}>Swaps work for recognized categories.</span></div>}
</>}
</div>

  </div>
}

ReactDOM.createRoot(document.getElementById(“root”)).render(<App/>);
</script>

</body>
</html>
