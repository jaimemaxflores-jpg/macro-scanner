style={{fontSize:11,fontWeight:700,color:T.mt,letterSpacing:0.5,marginBottom:6}}>VS {scanned.name.toUpperCase()}</div>{[[“Calories”,scanned.cal,it.cal,””,“lower”],[“Protein”,scanned.p,it.p,“g”,“higher”],[“Carbs”,scanned.c,it.c,“g”,“lower”],[“Fat”,scanned.f,it.f,“g”,“lower”],[“Fiber”,scanned.fb,it.fb,“g”,“higher”],[“Sugar”,scanned.s,it.s,“g”,“lower”]].map(function(row){var l=row[0],sv=row[1],nv=row[2],u=row[3],better=row[4];var df=nv-sv;var good=better===“higher”?df>0:df<0;return <div key={l} style={{display:“flex”,justifyContent:“space-between”,fontSize:12,padding:“3px 0”}}><span style={{color:T.sub}}>{l}</span><span style={{fontWeight:600,color:df===0?T.mt:good?T.pos:T.neg}}>{nv}{u} {df>0?”\u25B2”:df<0?”\u25BC”:”\u2014”} {Math.abs(df).toFixed(1)}{u}</span></div>})}</div>}</div>}

function App(){
var s1=useState(“search”);var screen=s1[0];var setScreen=s1[1];
var s2=useState(””);var query=s2[0];var setQuery=s2[1];
var s3=useState([]);var results=s3[0];var setResults=s3[1];
var s4=useState(false);var loading=s4[0];var setLoading=s4[1];
var s5=useState(false);var searched=s5[0];var setSearched=s5[1];
var s6=useState(null);var item=s6[0];var setItem=s6[1];
var s7=useState(””);var price=s7[0];var setPrice=s7[1];
var s8=useState([“highProtein”,“lowCal”]);var nGoals=s8[0];var setNG=s8[1];
var s9=useState([]);var dGoals=s9[0];var setDG=s9[1];
var s10=useState(false);var showGoals=s10[0];var setSG=s10[1];
var s11=useState(“nutrition”);var goalTab=s11[0];var setGT=s11[1];
var allGoals=nGoals.concat(dGoals);

var doSearch=function(q){var term=(q||query).trim();if(!term)return;setLoading(true);setSearched(true);setResults([]);var localHits=SUBS_DB.filter(function(it){return it.name.toLowerCase().indexOf(term.toLowerCase())!==-1});searchOFF(term).then(function(offHits){var combined=[].concat(localHits);for(var i=0;i<offHits.length;i++){var off=offHits[i];var isDupe=false;for(var j=0;j<combined.length;j++){var a=combined[j].name.toLowerCase().replace(/[^a-z0-9]/g,””);var b=off.name.toLowerCase().replace(/[^a-z0-9]/g,””);if(a.indexOf(b.slice(0,15))!==-1||b.indexOf(a.slice(0,15))!==-1){isDupe=true;break}}if(!isDupe)combined.push(off)}setResults(combined.slice(0,25));setLoading(false)})};
var selectItem=function(it){setItem(it);setScreen(“detail”);setPrice(””)};
var goBack=function(){setScreen(“search”);setItem(null)};
var tax=useMemo(function(){if(!item||!price)return null;var p=parseFloat(price);if(isNaN(p))return null;var t=item.tax?p*TAX:0;return{sub:p,tax:t,total:p+t}},[item,price]);
var subs=useMemo(function(){if(!item||allGoals.length===0||!item.sub||item.sub===“other”)return[];var myScore=scoreIt(item,allGoals);return SUBS_DB.filter(function(v){return v.name!==item.name&&v.sub===item.sub&&passDiet(v,dGoals)}).map(function(v){var copy={};for(var k in v)copy[k]=v[k];copy._sc=scoreIt(v,allGoals);return copy}).filter(function(v){return v._sc>myScore}).sort(function(a,b){return b._sc-a._sc}).slice(0,6)},[item,allGoals.join(”,”),dGoals.join(”,”)]);
var subLabel=item?(SUB_LABELS[item.sub]||””):””;

var CATS=[[“🍕”,“Pizza”],[“🍔”,“Burger”],[“🌮”,“Tacos”],[“🌯”,“Burrito”],[“🥪”,“Sandwich”],[“🍗”,“Wings”],[“🍟”,“Fries”],[“🥗”,“Salad”],[“🍚”,“Rice Bowl”],[“🥞”,“Pancakes”],[“🍩”,“Donuts”],[“🎂”,“Cake”],[“🌭”,“Hot Dog”],[“🍳”,“Breakfast Sandwich”],[“🧀”,“Mac and Cheese”],[“🍜”,“Ramen”],[“🍲”,“Soup”],[“🥩”,“Jerky”],[“🍫”,“Protein Bars”],[“🥛”,“Greek Yogurt”],[“🍞”,“Bread”],[“🥔”,“Chips”],[“🥣”,“Cereal”],[“🍦”,“Ice Cream”],[“⚡”,“Energy Drink”],[“🍪”,“Cookies”],[“🍝”,“Pasta”],[“🥜”,“Peanut Butter”],[“🍬”,“Candy”],[“🥐”,“Pop Tarts”],[“🌮”,“Tortillas”],[“🍱”,“Frozen Meal”],[“🥤”,“Smoothie”],[“🧃”,“Juice”],[“☕”,“Coffee”]];

return <div style={{minHeight:“100vh”,background:T.bg}}>
<div style={{background:”#fff”,borderBottom:“1px solid “+T.bdr,padding:“14px 16px”,position:“sticky”,top:0,zIndex:10}}>
<div style={{display:“flex”,alignItems:“center”,gap:10,maxWidth:480,margin:“0 auto”}}>
{screen===“detail”&&<button onClick={goBack} style={{background:T.bg,border:“1px solid “+T.bdr,borderRadius:8,width:36,height:36,display:“flex”,alignItems:“center”,justifyContent:“center”,fontSize:18,cursor:“pointer”,color:T.tx,flexShrink:0}}>{”\u2190”}</button>}
<div style={{flex:1}}><h1 style={{margin:0,fontSize:18,fontWeight:800,color:T.tx,letterSpacing:-0.5}}>PLU Macro Scanner</h1><div style={{fontSize:10,color:T.mt,fontFamily:”‘JetBrains Mono’,monospace”}}>Bexar County - 8.25% Tax - 280+ items + Open Food Facts</div></div>
<span style={{fontSize:10,fontWeight:700,letterSpacing:2,color:T.ac}}>v0.6</span>
</div>
</div>
<div style={{maxWidth:480,margin:“0 auto”,padding:“14px 16px 40px”}}>
{screen===“search”&&<div>
<div style={{display:“flex”,gap:8,marginBottom:16,background:T.card,borderRadius:14,padding:5,boxShadow:T.shL,border:“1px solid “+T.bdr}}>
<input value={query} onChange={function(e){setQuery(e.target.value);setSearched(false)}} onKeyDown={function(e){if(e.key===“Enter”)doSearch()}} placeholder=“Search any food…” style={{flex:1,padding:“11px 14px”,background:“transparent”,border:“none”,color:T.tx,fontSize:15,outline:“none”}}/>
<button onClick={function(){doSearch()}} style={{padding:“10px 20px”,background:T.ac,border:“none”,borderRadius:10,color:”#fff”,fontSize:14,fontWeight:700,cursor:“pointer”}}>Search</button>
</div>
{!searched&&<div style={{marginBottom:16}}><div style={{fontSize:11,fontWeight:700,color:T.mt,letterSpacing:0.5,marginBottom:10}}>POPULAR CATEGORIES</div><div style={{display:“flex”,gap:8,flexWrap:“wrap”}}>{CATS.map(function(c,i){return <button key={c[1]+i} onClick={function(){setQuery(c[1]);doSearch(c[1])}} style={{padding:“8px 14px”,background:T.card,border:“1px solid “+T.bdr,borderRadius:22,fontSize:13,cursor:“pointer”,color:T.sub,fontWeight:500,display:“flex”,alignItems:“center”,gap:6,boxShadow:T.sh}}><span>{c[0]}</span> {c[1]}</button>})}</div></div>}
{loading&&<div style={{textAlign:“center”,padding:“40px 20px”,color:T.sub}}><div style={{fontSize:32,marginBottom:10,animation:“spin 1s linear infinite”}}>{”\uD83D\uDD04”}</div><div style={{fontSize:14}}>Searching…</div></div>}
{!loading&&searched&&<div><div style={{fontSize:11,fontWeight:700,color:T.mt,letterSpacing:0.5,marginBottom:10}}>{results.length} RESULTS</div>{results.length>0?results.map(function(it,i){return <ResultRow key={it.name+i} it={it} onClick={function(){selectItem(it)}}/>}):<div style={{textAlign:“center”,padding:“40px 20px”,color:T.sub}}>No results found.</div>}</div>}
{!searched&&!loading&&<div style={{textAlign:“center”,padding:“30px 20px”,marginTop:10}}><div style={{width:72,height:72,borderRadius:18,background:T.card,boxShadow:T.shL,display:“flex”,alignItems:“center”,justifyContent:“center”,margin:“0 auto 14px”,fontSize:32,border:“1px solid “+T.bdr}}>{”\uD83D\uDD0D”}</div><div style={{fontSize:16,fontWeight:600,color:T.tx,marginBottom:4}}>Search any food product</div><div style={{fontSize:13,color:T.mt,lineHeight:1.5}}>Type a product name or tap a category above.</div></div>}
</div>}
{screen===“detail”&&item&&<div>
<div style={{background:T.card,border:“1px solid “+T.bdr,borderRadius:16,padding:20,marginBottom:14,boxShadow:T.sh}}>
<div style={{display:“flex”,gap:14,alignItems:“center”,marginBottom:16}}>
<ItemImg it={item} sz={52}/>
<div style={{flex:1}}><h2 style={{margin:0,fontSize:16,fontWeight:700,color:T.tx,lineHeight:1.3}}>{item.name}</h2><div style={{fontSize:12,color:T.mt,fontFamily:”‘JetBrains Mono’,monospace”,marginTop:3}}>{item.sv}</div></div>
<div style={{background:item.tax?”#FEF2F2”:”#ECFDF5”,color:item.tax?”#B91C1C”:”#059669”,fontSize:10,fontWeight:700,padding:“4px 10px”,borderRadius:20,flexShrink:0}}>{item.tax?“TAXABLE”:“EXEMPT”}</div>
</div>
<div style={{textAlign:“center”,marginBottom:16}}><div style={{fontSize:52,fontWeight:800,color:T.cal,lineHeight:1,letterSpacing:-2}}>{item.cal}</div><div style={{fontSize:11,color:T.mt,fontWeight:600,letterSpacing:2,marginTop:4}}>CALORIES</div></div>
<div style={{display:“flex”,gap:8,marginBottom:14}}><Pill label=“PROTEIN” value={item.p+“g”} color={T.pr}/><Pill label=“CARBS” value={item.c+“g”} color={T.cb}/><Pill label=“FAT” value={item.f+“g”} color={T.ft}/></div>
<div style={{borderTop:“1px solid “+T.bdr,paddingTop:10}}>{[[“Fiber”,item.fb,T.fbr],[“Sugar”,item.s,T.sg]].map(function(row){return <div key={row[0]} style={{display:“flex”,justifyContent:“space-between”,padding:“5px 0”}}><span style={{fontSize:12,color:T.sub}}>{row[0]}</span><span style={{fontSize:13,fontWeight:600,color:row[2]}}>{row[1]}g</span></div>})}</div>
</div>
<div style={{background:T.card,border:“1px solid “+T.bdr,borderRadius:16,padding:16,marginBottom:14,boxShadow:T.sh}}>
<div style={{fontSize:12,fontWeight:700,color:T.mt,letterSpacing:0.5,marginBottom:10}}>PRICE CALCULATOR</div>
<div style={{display:“flex”,gap:8,alignItems:“center”}}><span style={{color:T.sub,fontSize:20,fontWeight:600}}>$</span><input type=“number” step=“0.01” value={price} onChange={function(e){setPrice(e.target.value)}} placeholder=“Shelf price” style={{flex:1,padding:“10px 12px”,background:T.bg,border:“1px solid “+T.bdr,borderRadius:10,color:T.tx,fontSize:18,fontFamily:”‘JetBrains Mono’,monospace”,outline:“none”}}/></div>
{tax&&<div style={{marginTop:14,borderTop:“1px solid “+T.bdr,paddingTop:12,fontFamily:”‘JetBrains Mono’,monospace”}}><div style={{display:“flex”,justifyContent:“space-between”,fontSize:13,color:T.sub,marginBottom:4}}><span>Subtotal</span><span>${tax.sub.toFixed(2)}</span></div><div style={{display:“flex”,justifyContent:“space-between”,fontSize:13,color:item.tax?T.cal:T.pos,marginBottom:4}}><span>Tax (8.25%)</span><span>{item.tax?”+$”+tax.tax.toFixed(2):“Exempt”}</span></div><div style={{display:“flex”,justifyContent:“space-between”,fontSize:22,fontWeight:800,color:T.tx,borderTop:“1px solid “+T.bdr,paddingTop:8,marginTop:4}}><span>Total</span><span>${tax.total.toFixed(2)}</span></div>{item.p>0&&<div style={{fontSize:11,color:T.mt,marginTop:8,textAlign:“right”}}>${(tax.total/item.p).toFixed(2)}/g protein</div>}</div>}
</div>
{subLabel&&<div style={{background:T.card,border:“1px solid “+T.bdr,borderRadius:16,padding:16,marginBottom:14,boxShadow:T.sh}}>
<button onClick={function(){setSG(!showGoals)}} style={{width:“100%”,background:“none”,border:“none”,cursor:“pointer”,display:“flex”,justifyContent:“space-between”,alignItems:“center”,padding:0}}><span style={{fontSize:12,fontWeight:700,color:T.mt,letterSpacing:0.5}}>MY GOALS ({allGoals.length})</span><span style={{color:T.mt,fontSize:14}}>{showGoals?”\u25B2”:”\u25BC”}</span></button>
{showGoals&&<div style={{marginTop:14}}>
<div style={{display:“flex”,background:T.bg,borderRadius:10,padding:3,marginBottom:14}}>{[[“nutrition”,“Nutrition”],[“diet”,“Diet Type”]].map(function(pair){return <button key={pair[0]} onClick={function(){setGT(pair[0])}} style={{flex:1,padding:“8px 0”,border:“none”,borderRadius:8,background:goalTab===pair[0]?T.card:“transparent”,boxShadow:goalTab===pair[0]?T.sh:“none”,color:goalTab===pair[0]?T.tx:T.mt,fontSize:13,fontWeight:600,cursor:“pointer”}}>{pair[1]}</button>})}</div>
{(goalTab===“nutrition”?NUTR_GOALS:DIET_GOALS).map(function(g){var active=goalTab===“nutrition”?nGoals.indexOf(g.id)!==-1:dGoals.indexOf(g.id)!==-1;var toggle=function(){if(goalTab===“nutrition”){setNG(function(p){return p.indexOf(g.id)!==-1?p.filter(function(x){return x!==g.id}):p.concat([g.id])})}else{setDG(function(p){return p.indexOf(g.id)!==-1?p.filter(function(x){return x!==g.id}):p.concat([g.id])})}};return <button key={g.id} onClick={toggle} style={{display:“flex”,alignItems:“center”,gap:10,padding:“10px 12px”,width:“100%”,marginBottom:6,background:active?T.acL:T.bg,border:active?“1.5px solid “+T.ac:“1px solid “+T.bdr,borderRadius:10,cursor:“pointer”,textAlign:“left”}}><span style={{fontSize:20}}>{g.icon}</span><div><div style={{fontSize:13,fontWeight:600,color:active?T.acD:T.tx}}>{g.label}</div><div style={{fontSize:11,color:T.mt}}>{g.d}</div></div></button>})}
</div>}
</div>}
{allGoals.length>0&&subLabel&&<div>
<div style={{fontSize:12,fontWeight:700,color:T.mt,letterSpacing:0.5,marginBottom:4}}>SWAP IN {subLabel.toUpperCase()}</div>
<div style={{fontSize:12,color:T.mt,marginBottom:14}}>Same type, better for your goals</div>
{subs.length>0?<div style={{display:“flex”,flexDirection:“column”,gap:10}}>{subs.map(function(s,i){return <SubCard key={s.name+i} it={s} scanned={item} rank={i} goals={allGoals}/>})}</div>:<div style={{background:T.card,border:“1px dashed “+T.bdr,borderRadius:14,padding:24,textAlign:“center”,color:T.mt,fontSize:13}}>Already the best {subLabel.toLowerCase()} for your goals</div>}
</div>}
{!subLabel&&<div style={{background:T.card,border:“1px dashed “+T.bdr,borderRadius:14,padding:20,textAlign:“center”,color:T.sub,fontSize:13}}>Substitutions not available for this item yet.</div>}
</div>}
</div>

  </div>
}

ReactDOM.createRoot(document.getElementById(“root”)).render(<App/>);
</script>
